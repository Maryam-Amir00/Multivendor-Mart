{% extends "base.html" %}
{% block title %}Add Product — MiniVendor{% endblock %}
{% block content %}

<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow">

    <h1 class="text-3xl font-bold text-gray-900 mb-6">Add New Product</h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        {% for field in form %}
        <div>
            <label class="block font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}

            {% if field.errors %}
                <p class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <button class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700">
            Add Product
        </button>
    </form>

</div>

{% endblock %}
