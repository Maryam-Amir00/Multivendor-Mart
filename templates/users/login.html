{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-center min-h-[80vh] bg-gray-100">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">

    <h2 class="text-3xl font-bold text-center mb-6 text-gray-800">
      Login
    </h2>

    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <style>
        input, select {
          @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500;
        }
      </style>

      {{ form.non_field_errors }}

      {% for field in form %}
      <div>
        <label class="block text-gray-700 font-medium mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-500 text-sm">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}

      <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Login
      </button>
    </form>

    <p class="text-center mt-4 text-sm text-gray-600">
      Don’t have an account?
      <a href="{% url 'register_customer' %}" class="text-blue-600 hover:underline">Register as Customer</a>
      |
      <a href="{% url 'register_vendor' %}" class="text-blue-600 hover:underline">Register as Vendor</a>
    </p>

  </div>
</div>

{% endblock %}
